<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML%</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua a tela</p>
    <picture>
        <source media="(max-width:750px )" srcset="/img/P.png" type="image/png">
        <source media="(max-width:1050px )" srcset="/img/M.png" type="image/png">
        <img src="/img/G.png" alt="imagem flexivel">
    </picture>

    <h1>Repoduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio src="/ex011/midia/audio.m4a" controls></audio>
</body>
</html>
